<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>OKE Quotes Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --ink: #111827;
    --muted: #6b7280;
    --line: #e5e7eb;
    --brand: #ff6a00;
    --ok: #15803d;
    --warn: #a16207;
    --bad: #b91c1c;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header { background: #111827; color: white; padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
  header h1 { margin: 0; font-size: 18px; }
  header span { color: #cbd5e1; font-size: 13px; }
  main { max-width: 1260px; margin: 0 auto; padding: 24px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 18px; margin-bottom: 16px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04); }
  .login { max-width: 440px; margin: 52px auto; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  input, select { width: 100%; border: 1px solid var(--line); border-radius: 6px; padding: 10px 11px; font: inherit; background: white; color: var(--ink); }
  button, .btn { border: 1px solid transparent; border-radius: 6px; padding: 9px 12px; font-weight: 700; font: inherit; cursor: pointer; background: var(--brand); color: #111827; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  button.secondary, .btn.secondary { background: white; border-color: var(--line); color: var(--ink); }
  button.danger { background: #fee2e2; color: var(--bad); border-color: #fecaca; }
  .toolbar { display: grid; grid-template-columns: 150px 150px minmax(220px, 1fr) auto; gap: 10px; align-items: end; }
  .stats { display: grid; grid-template-columns: repeat(6, minmax(120px, 1fr)); gap: 10px; }
  .stat { background: #f9fafb; border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
  .stat b { display: block; font-size: 22px; }
  .stat span { color: var(--muted); font-size: 12px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px 8px; border-bottom: 1px solid var(--line); vertical-align: top; text-align: left; }
  th { font-size: 12px; color: var(--muted); font-weight: 700; background: #f9fafb; position: sticky; top: 0; z-index: 1; }
  .table-wrap { max-height: 62vh; overflow: auto; border: 1px solid var(--line); border-radius: 8px; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
  .muted { color: var(--muted); }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; border: 1px solid var(--line); background: #f9fafb; }
  .pill.hot { color: var(--warn); border-color: #facc15; background: #fefce8; }
  .pill.ok { color: var(--ok); border-color: #86efac; background: #f0fdf4; }
  .pill.bad { color: var(--bad); border-color: #fca5a5; background: #fef2f2; }
  .actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .lanes { display: grid; grid-template-columns: repeat(3, minmax(180px, 1fr)); gap: 8px; }
  .lane-card { background: #f9fafb; border: 1px solid var(--line); border-radius: 8px; padding: 10px; }
  .hidden { display: none !important; }
  @media (max-width: 860px) {
    .toolbar, .stats, .lanes { grid-template-columns: 1fr; }
    header { align-items: flex-start; flex-direction: column; }
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>OKE Quotes Admin</h1>
    <span id="sessionLabel">Not signed in</span>
  </div>
  <div class="actions">
    <a class="btn secondary" href="./">Calculator</a>
    <a class="btn secondary" href="dashboard.html">Client dashboard</a>
    <a class="btn secondary" href="manual.html">Manual</a>
    <button class="secondary hidden" id="signOutBtn">Sign out</button>
  </div>
</header>
<main>
  <section class="panel login" id="loginPanel">
    <h2 style="margin-top:0">Team Console</h2>
    <p class="muted">Enter the team password to access live bookings and rate tools.</p>
    <label for="passInput">Team password</label>
    <input id="passInput" type="password" autocomplete="off" placeholder="************">
    <div style="margin-top:12px"><button id="unlockBtn">Unlock console</button></div>
    <p class="muted" id="loginMsg"></p>
  </section>

  <section id="dashPanel" class="hidden">
    <div class="panel">
      <div class="toolbar">
        <div>
          <label for="statusFilter">Status</label>
          <select id="statusFilter">
            <option value="">All</option>
            <option value="draft">Draft</option>
            <option value="shared">Shared</option>
            <option value="viewed">Viewed</option>
            <option value="booking_requested">Booking requested</option>
            <option value="booked">Booked</option>
            <option value="lost">Lost</option>
          </select>
        </div>
        <div>
          <label for="sinceFilter">Range</label>
          <select id="sinceFilter">
            <option value="7">Last 7 days</option>
            <option value="30" selected>Last 30 days</option>
            <option value="90">Last 90 days</option>
            <option value="">All time</option>
          </select>
        </div>
        <div>
          <label for="searchInput">Search</label>
          <input id="searchInput" placeholder="Quote ref, customer, origin, destination">
        </div>
        <button id="refreshBtn">Refresh</button>
      </div>
    </div>

    <div class="panel stats" id="stats"></div>
    <div class="panel">
      <h2 style="margin-top:0">Lane Signals</h2>
      <div class="lanes" id="laneStats"></div>
    </div>
    <div class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Quote</th>
              <th>Lane</th>
              <th>Total</th>
              <th>Status</th>
              <th>Views</th>
              <th>Customer</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="quoteRows"></tbody>
        </table>
      </div>
    </div>
  </section>
</main>
<script>
const SUPABASE_CONFIG = {
  url: "https://wwtaadvzonnbvyhottlv.supabase.co",
  anonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3dGFhZHZ6b25uYnZ5aG90dGx2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNTkxNDAsImV4cCI6MjA5NDYzNTE0MH0.UciCmDWB3Mq7SsPbXqOXvai6cisqRiGC9gQkxmP2gSA"
};
const sb = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
const $ = id => document.getElementById(id);
const TEAM_PASS = 'oke2026';
const money = n => "$" + Number(n || 0).toLocaleString("en-CA", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
const dateFmt = v => v ? new Date(v).toLocaleString("en-CA", { dateStyle: "medium", timeStyle: "short" }) : "-";
function shareUrl(token) { return `https://okecanada.github.io/montedesign/q/${token}`; }
function sinceIso() {
  const days = $("sinceFilter").value;
  if (!days) return null;
  const d = new Date();
  d.setDate(d.getDate() - Number(days));
  return d.toISOString();
}
function setUnlocked(unlocked) {
  $("loginPanel").classList.toggle("hidden", !!unlocked);
  $("dashPanel").classList.toggle("hidden", !unlocked);
  $("signOutBtn").classList.toggle("hidden", !unlocked);
  $("sessionLabel").textContent = unlocked ? "Team console unlocked" : "Not signed in";
}
function tryUnlock() {
  const pwd = $("passInput").value || '';
  if (pwd === TEAM_PASS) {
    sessionStorage.setItem('okeAdminAuth', pwd);
    $("loginMsg").textContent = '';
    setUnlocked(true);
    refresh();
  } else {
    $("loginMsg").textContent = "Wrong password.";
    $("passInput").value = '';
    $("passInput").focus();
  }
}
async function loadStats() {
  const pwd = sessionStorage.getItem('okeAdminAuth') || TEAM_PASS;
  const { data, error } = await sb.rpc("admin_dashboard_stats_open", { p_secret: pwd });
  if (error) throw error;
  if (data && data.error) throw new Error(String(data.error));
  const sObj = data && data.stats || {};
  const s = {
    total_quotes: (Number(sObj.drafts)||0) + (Number(sObj.saved)||0) + (Number(sObj.booking_requested)||0),
    total_shared: (Number(sObj.saved)||0) + (Number(sObj.booking_requested)||0),
    total_viewed: Number(sObj.last_7) || 0,
    total_booked: Number(sObj.booking_requested) || 0,
    total_value: Number(sObj.gmv_7) || 0,
    booked_value: Number(sObj.booked_gmv) || 0,
    _raw: sObj, _recent: data && data.recent || [], _top_lanes: data && data.top_lanes || []
  };
  const items = [
    ["Quotes", s.total_quotes],
    ["Shared", s.total_shared],
    ["Active 7d", s.total_viewed],
    ["Booking req.", s.total_booked],
    ["GMV (7d)", money(s.total_value)],
    ["Booked GMV", money(s.booked_value)]
  ];
  $("stats").innerHTML = items.map(([label, value]) => `<div class="stat"><b>${value || 0}</b><span>${label}</span></div>`).join("");
  return s;
}
/* legacy loadStats removed — replaced by oke2026-gated version above */
function renderLaneStats(rows) {
  const lanes = new Map();
  rows.forEach(q => {
    const key = `${q.origin || "-"} -> ${q.destination || "Local"}`;
    const lane = lanes.get(key) || { key, count: 0, booked: 0, lost: 0, viewed: 0, value: 0 };
    lane.count += 1;
    lane.booked += q.status === "booked" ? 1 : 0;
    lane.lost += q.status === "lost" ? 1 : 0;
    lane.viewed += Number(q.view_count || 0) > 0 ? 1 : 0;
    lane.value += Number(q.total_after_tax || 0);
    lanes.set(key, lane);
  });
  const top = Array.from(lanes.values()).sort((a, b) => b.count - a.count || b.value - a.value).slice(0, 9);
  $("laneStats").innerHTML = top.length
    ? top.map(l => `<div class="lane-card"><b>${esc(l.key)}</b><div class="muted">${l.count} quoted / ${l.viewed} viewed / ${l.booked} booked / ${l.lost} lost</div><div>${money(l.value)}</div></div>`).join("")
    : `<div class="muted">No lanes in this range yet.</div>`;
}
function esc(v) {
  return String(v == null ? "" : v).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function hotPill(q) {
  const views = Number(q.view_count || 0);
  if (views >= 3) return `<span class="pill hot">${views} views</span>`;
  if (views > 0) return `<span class="pill ok">${views} view${views === 1 ? "" : "s"}</span>`;
  return `<span class="pill">0 views</span>`;
}
async function updateStatus(id, status) {
  const { error } = await sb.from("quotes").update({ status }).eq("id", id);
  if (error) alert(error.message);
  await refresh();
}
// Recent quotes are now part of admin_dashboard_stats_open — pulled from the same call.
let LAST_DATA = null;
async function loadQuotes() {
  // Use the data already loaded by loadStats() (cached on LAST_DATA)
  const rows = (LAST_DATA && LAST_DATA._recent) || [];
  const status = $("statusFilter").value;
  const search = ($("searchInput").value || '').trim().toLowerCase();
  const filtered = rows.filter(q => {
    if (status && q.status !== status) return false;
    if (search) {
      const hay = [q.quote_ref, q.origin, q.destination, q.contact_name, q.contact_email].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
  // Build lane stats from the top_lanes precomputed bucket
  const top = (LAST_DATA && LAST_DATA._top_lanes) || [];
  $("laneStats").innerHTML = top.length
    ? top.map(l => `<div class="lane-card"><b>${esc(l.lane)}</b><div class="muted">${l.n} quoted</div><div>${money(l.gmv)}</div></div>`).join("")
    : `<div class="muted">No lanes in this range yet.</div>`;
  $("quoteRows").innerHTML = filtered.length ? filtered.map(q => `
    <tr>
      <td><div class="mono">${esc(q.quote_ref)}</div><a href="${shareUrl(q.public_token)}" target="_blank" rel="noopener">open</a></td>
      <td>${esc(q.origin || "-")}<br><span class="muted">${esc(q.destination || "Local delivery")}</span></td>
      <td>${money(q.total_after_tax)}</td>
      <td><span class="pill ${q.status === "booked" || q.status === "booking_requested" ? "ok" : q.status === "lost" ? "bad" : ""}">${esc(q.status)}</span></td>
      <td><span class="pill">${esc(q.service_name || '')}</span></td>
      <td>${esc(q.contact_name || "-")}<br><span class="muted">${esc(q.contact_email || "")}</span></td>
      <td>${dateFmt(q.created_at)}</td>
      <td><div class="actions">
        <a class="btn secondary" href="${shareUrl(q.public_token)}" target="_blank" rel="noopener">View</a>
      </div></td>
    </tr>
  `).join("") : `<tr><td colspan="8" class="muted">No quotes match the current filters.</td></tr>`;
}
async function refresh() {
  $("refreshBtn").disabled = true;
  try {
    LAST_DATA = await loadStats();
    await loadQuotes();
  } catch (e) {
    $("quoteRows").innerHTML = `<tr><td colspan="8" style="color:var(--bad)">${esc(e.message || e)}</td></tr>`;
  } finally {
    $("refreshBtn").disabled = false;
  }
}
/* loadStats is defined above (the new oke2026-gated version) */
async function _legacyStub() {
  return null;
};
document.addEventListener("DOMContentLoaded", async () => {
  $("unlockBtn").addEventListener("click", tryUnlock);
  $("passInput").addEventListener("keydown", (e) => { if (e.key === 'Enter') tryUnlock(); });
  $("signOutBtn").addEventListener("click", () => { sessionStorage.removeItem('okeAdminAuth'); setUnlocked(false); });
  ["statusFilter", "sinceFilter"].forEach(id => $(id).addEventListener("change", refresh));
  $("searchInput").addEventListener("input", () => { clearTimeout(window._searchTimer); window._searchTimer = setTimeout(refresh, 250); });
  $("refreshBtn").addEventListener("click", refresh);
  // Auto-unlock if previously authed in this session
  if (sessionStorage.getItem('okeAdminAuth') === TEAM_PASS) { setUnlocked(true); refresh(); }
  else setUnlocked(false);
  setInterval(() => { if (!$("dashPanel").classList.contains('hidden')) refresh(); }, 30000);
});
</script>
</body>
</html>
