<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>System Status · OKE Canada</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Geist+Mono:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#000;--ink:#fafafa;--muted:#a1a1aa;--line:#27272a;--brand:#ff6a00;--brand2:#ff9b66;--cool:#14b8a6;--ok:#22c55e;--bad:#ef4444;--warn:#fbbf24}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(900px 520px at 80% -14%,rgba(255,106,0,.14),transparent 58%),radial-gradient(760px 520px at 7% 100%,rgba(20,184,166,.12),transparent 60%),var(--bg);color:var(--ink);font:15px/1.55 Geist,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.30;background:linear-gradient(rgba(255,255,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.07) 1px,transparent 1px);background-size:96px 96px}
  header{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 28px;background:rgba(0,0,0,.74);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:-.02em}
  .mark{display:grid;place-items:center;width:42px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;box-shadow:0 14px 30px rgba(255,106,0,.25)}
  nav{display:flex;gap:8px;flex-wrap:wrap}
  nav a{color:var(--ink);text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-weight:850;background:rgba(255,255,255,.04)}
  nav a:hover{border-color:rgba(255,106,0,.46)}
  nav a.active{border-color:rgba(34,197,94,.6);background:rgba(34,197,94,.10);color:#86efac}
  main{position:relative;max-width:1100px;margin:0 auto;padding:42px 20px 72px}
  .kicker{font:850 11px/1 "Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.16em;text-transform:uppercase;color:var(--brand)}
  h1{font-size:clamp(42px,7vw,86px);line-height:.92;margin:10px 0 14px;letter-spacing:-.065em}
  .summary{display:flex;align-items:center;gap:18px;padding:24px;border:1px solid var(--line);border-radius:22px;background:rgba(9,9,11,.78);margin-bottom:22px}
  .heart{width:64px;height:64px;border-radius:18px;display:grid;place-items:center;flex:0 0 64px;font-size:30px;animation:beat 1.8s ease-in-out infinite}
  .heart.up{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;box-shadow:0 14px 30px rgba(34,197,94,.30)}
  .heart.down{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;box-shadow:0 14px 30px rgba(239,68,68,.40)}
  .heart.warn{background:linear-gradient(135deg,#d97706,#fbbf24);color:#000;box-shadow:0 14px 30px rgba(251,191,36,.40)}
  @keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  .summary b{display:block;font-size:30px;letter-spacing:-.04em;line-height:1}
  .summary span{color:var(--muted);font-size:14px;margin-top:6px;display:block}
  .systems{display:grid;gap:12px}
  .system{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:16px;padding:16px 18px;border:1px solid var(--line);border-radius:18px;background:rgba(9,9,11,.78)}
  .dot{width:12px;height:12px;border-radius:50%;flex:0 0 12px}
  .dot.up{background:var(--ok);box-shadow:0 0 16px rgba(34,197,94,.7);animation:pulse 1.6s ease-in-out infinite}
  .dot.down{background:var(--bad);box-shadow:0 0 16px rgba(239,68,68,.6)}
  .dot.warn{background:var(--warn);box-shadow:0 0 16px rgba(251,191,36,.6)}
  .dot.unknown{background:#71717a}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .system b{display:block;font-size:15px;letter-spacing:-.01em}
  .system .desc{color:var(--muted);font-size:12.5px;margin-top:3px;line-height:1.45}
  .system .ms{font:850 12px/1 "Geist Mono",monospace;color:var(--muted);text-align:right}
  .system .ms b{font-size:18px;letter-spacing:-.03em;color:var(--ink)}
  .badge-up{color:#86efac}.badge-down{color:#fca5a5}.badge-warn{color:#fcd34d}
  footer{margin-top:30px;text-align:right;color:rgba(255,255,255,.30);font-size:12px}
  footer a{color:inherit;text-decoration:none}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="mark">OKE</span><span>System Status</span></div>
  <nav>
    <a href="./">Calculator</a>
    <a href="manual.html">Manual</a>
    <a href="tools.html">Tools</a>
    <a href="coverage.html">Coverage</a>
    <a href="status.html" class="active">Status</a>
  </nav>
</header>
<main>
  <div class="kicker">live system health</div>
  <h1>All systems status.</h1>

  <div class="summary">
    <div class="heart up" id="overallHeart">●</div>
    <div>
      <b id="overallTitle">Checking systems…</b>
      <span id="overallSub">Pinging every edge function and RPC.</span>
    </div>
  </div>

  <div class="systems" id="systemsGrid"></div>

  <footer style="margin-top:28px">Last check <span id="lastCheck">—</span> · <a href="admin.html">Team login</a></footer>
</main>

<script>
const SB_URL  = "https://wwtaadvzonnbvyhottlv.supabase.co";
const SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3dGFhZHZ6b25uYnZ5aG90dGx2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNTkxNDAsImV4cCI6MjA5NDYzNTE0MH0.UciCmDWB3Mq7SsPbXqOXvai6cisqRiGC9gQkxmP2gSA";
const $ = id => document.getElementById(id);
const esc = v => String(v == null ? "" : v).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

const CHECKS = [
  { id: "db",        title: "Rate table (Postgres)", desc: "6,000+ lanes, case-insensitive RPC.", run: pingDb,        thresholdMs: 1200 },
  { id: "fuel",      title: "Fuel index",            desc: "Daily-cached Canadian diesel.",        run: pingFuel,      thresholdMs: 2500 },
  { id: "weather",   title: "Weather forecast",      desc: "Open-Meteo 7-day window.",             run: pingWeather,   thresholdMs: 3500 },
  { id: "postal",    title: "Postal lookup",         desc: "CA/US postal → city/lat/lng.",         run: pingPostal,    thresholdMs: 3000 },
  { id: "route",     title: "Driving distance",      desc: "OSRM road-network routing.",           run: pingRoute,     thresholdMs: 4500 },
  { id: "carbon",    title: "Carbon calculator",     desc: "Freight CO₂e math.",                   run: pingCarbon,    thresholdMs: 1500 },
  { id: "holidays",  title: "Holiday calendar",      desc: "Canadian stat holidays.",              run: pingHolidays,  thresholdMs: 1500 },
  { id: "laneSugg",  title: "Lane suggest",          desc: "Closest priced lanes when missing.",   run: pingLaneSugg,  thresholdMs: 2500 },
  { id: "ai",        title: "AI vision (OpenAI)",    desc: "GPT-4o photo identifier.",             run: pingAi,        thresholdMs: 6000, soft: true },
];

async function timed(fn) {
  const t0 = performance.now();
  try {
    const ok = await fn();
    return { ok: !!ok, ms: Math.round(performance.now() - t0) };
  } catch (e) {
    return { ok: false, ms: Math.round(performance.now() - t0), error: String(e.message || e) };
  }
}
async function pingDb() {
  const r = await fetch(`${SB_URL}/rest/v1/rpc/list_origins`, { method: "POST", headers: { apikey: SB_ANON, Authorization: `Bearer ${SB_ANON}`, "content-type": "application/json" }, body: "{}" });
  if (!r.ok) return false; const arr = await r.json(); return Array.isArray(arr) && arr.length > 0;
}
async function pingFuel() {
  const r = await fetch(`${SB_URL}/functions/v1/fuel-index`, { headers: { apikey: SB_ANON, Authorization: `Bearer ${SB_ANON}` } });
  if (!r.ok) return false; const d = await r.json(); return !!(d && (d.provinces || d.national));
}
async function pingWeather() {
  const r = await fetch(`${SB_URL}/functions/v1/weather?origin=${encodeURIComponent("Toronto, ON")}`, { headers: { apikey: SB_ANON, Authorization: `Bearer ${SB_ANON}` } });
  return r.ok;
}
async function pingPostal() {
  const r = await fetch(`${SB_URL}/functions/v1/postal-lookup?postal=M5V3L9`, { headers: { apikey: SB_ANON, Authorization: `Bearer ${SB_ANON}` } });
  if (!r.ok) return false; const d = await r.json(); return !!(d && d.ok);
}
async function pingRoute() {
  const r = await fetch(`${SB_URL}/functions/v1/route-distance`, { method: "POST", headers: { apikey: SB_ANON, Authorization: `Bearer ${SB_ANON}`, "content-type": "application/json" }, body: JSON.stringify({ origin: "Toronto, ON", destination: "Hamilton, ON" }) });
  if (!r.ok) return false; const d = await r.json(); return !!(d && d.ok);
}
async function pingCarbon() {
  const r = await fetch(`${SB_URL}/functions/v1/carbon-track?billable_lbs=1000&distance_km=500`, { headers: { apikey: SB_ANON, Authorization: `Bearer ${SB_ANON}` } });
  if (!r.ok) return false; const d = await r.json(); return !!(d && d.ok);
}
async function pingHolidays() {
  const r = await fetch(`${SB_URL}/functions/v1/holiday-calendar?from=2026-01-01&to=2026-12-31`, { headers: { apikey: SB_ANON, Authorization: `Bearer ${SB_ANON}` } });
  if (!r.ok) return false; const d = await r.json(); return !!(d && Array.isArray(d.holidays));
}
async function pingLaneSugg() {
  const r = await fetch(`${SB_URL}/functions/v1/lane-suggest`, { method: "POST", headers: { apikey: SB_ANON, Authorization: `Bearer ${SB_ANON}`, "content-type": "application/json" }, body: JSON.stringify({ origin: "Toronto, ON", destination: "Vancouver, BC" }) });
  if (!r.ok) return false; const d = await r.json(); return !!(d && d.ok);
}
async function pingAi() {
  // Tiny 1×1 transparent JPEG so we don't burn real OpenAI budget; we just check the endpoint reachable
  const tiny = "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQH/2wBDAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQH/wAARCAABAAEDASIAAhEBAxEB/8QAFAABAAAAAAAAAAAAAAAAAAAAB//EABQQAQAAAAAAAAAAAAAAAAAAAAD/xAAUAQEAAAAAAAAAAAAAAAAAAAAA/8QAFBEBAAAAAAAAAAAAAAAAAAAAAP/aAAwDAQACEQMRAD8AABf/2Q==";
  const r = await fetch(`${SB_URL}/functions/v1/parse-furniture`, { method: "POST", headers: { apikey: SB_ANON, Authorization: `Bearer ${SB_ANON}`, "content-type": "application/json" }, body: JSON.stringify({ images: [tiny] }) });
  return r.status < 500;
}

function classify(check, result) {
  if (!result.ok) return "down";
  if (result.ms > check.thresholdMs) return "warn";
  return "up";
}

async function runAll() {
  $("systemsGrid").innerHTML = CHECKS.map(c => `
    <div class="system" id="row-${c.id}">
      <span class="dot unknown"></span>
      <div><b>${esc(c.title)}</b><div class="desc">${esc(c.desc)}</div></div>
      <div class="ms"><b>—</b><div>ms</div></div>
    </div>
  `).join("");
  let upCount = 0, downCount = 0, warnCount = 0;
  for (const c of CHECKS) {
    const r = await timed(c.run);
    const status = classify(c, r);
    const row = document.getElementById("row-" + c.id);
    row.querySelector(".dot").className = "dot " + status;
    const ms = row.querySelector(".ms");
    ms.innerHTML = `<b class="badge-${status === "up" ? "up" : status === "warn" ? "warn" : "down"}">${r.ms}</b><div>${status.toUpperCase()}${r.error ? " · " + esc(r.error.slice(0, 60)) : ""}</div>`;
    if (status === "up") upCount++;
    else if (status === "warn") warnCount++;
    else if (c.soft) warnCount++; else downCount++;
  }
  const heart = $("overallHeart"), title = $("overallTitle"), sub = $("overallSub");
  if (downCount === 0 && warnCount === 0) {
    heart.className = "heart up"; title.textContent = "All systems normal";
    sub.textContent = `${upCount} of ${CHECKS.length} services live · all within normal latency.`;
  } else if (downCount > 0) {
    heart.className = "heart down"; title.textContent = "Some systems offline";
    sub.textContent = `${downCount} down · ${warnCount} degraded · ${upCount} up.`;
  } else {
    heart.className = "heart warn"; title.textContent = "Partial degradation";
    sub.textContent = `${warnCount} slower than usual · everything else live.`;
  }
  $("lastCheck").textContent = new Date().toLocaleString("en-CA", { dateStyle: "medium", timeStyle: "short" });
}

document.addEventListener("DOMContentLoaded", () => {
  runAll();
  setInterval(runAll, 60000);
});
</script>
</body>
</html>
